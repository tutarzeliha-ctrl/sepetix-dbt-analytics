# ============================================================================
# SEPETIX ANALYTICS - dBT PROJECT CONFIGURATION
# ============================================================================
# This file is the heart of the dBT project. All settings configured here.

name: 'sepetix_analytics'                    # Project name
version: '1.0.0'                             # Version
config-version: 2                            # dBT config version

# ============================================================================
# PROFILE & DATABASE CONFIGURATION
# ============================================================================
profile: 'sepetix'                           # BigQuery profile

# Default behavior for each model
model-paths: ["models"]                      # Model file location
analysis-paths: ["analyses"]                 # Ad-hoc analysis location
test-paths: ["tests"]                        # Test file location
data-paths: ["data"]                         # Seed data location
macro-paths: ["macros"]                      # Macro location

target-path: "target"                        # Output directory
clean-targets:
  - "target"
  - "dbt_packages"

# ============================================================================
# MODEL CONFIGURATION
# ============================================================================
# +materialized: table = Save SQL as table (efficient for queries)
# +materialized: view = Execute in query (cost-efficient)
# +materialized: incremental = Add only new data (fast)

models:
  sepetix_analytics:
    # STAGING LAYER: Clean and standardize raw data
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]
      
    # MARTS LAYER: Business logic (analysis-ready tables)
    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts"]

# ============================================================================
# SEEDS (Static Reference Data)
# ============================================================================
seeds:
  sepetix_analytics:
    +schema: seeds

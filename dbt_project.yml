
# ============================================================================
# SEPETIX ANALYTICS - dBT PROJECT CONFIGURATION
# ============================================================================
# Bu dosya dBT projesinin merkezidir. Tüm ayarlar burada yapılır.

name: 'sepetix_analytics'                    # Proje adı
version: '1.0.0'                             # Versiyon
config-version: 2                            # dBT config sürümü

# ============================================================================
# PROFILE & DATABASE CONFIGURATION
# ============================================================================
profile: 'sepetix'                           # BigQuery profili

# Her model için default davranış
model-paths: ["models"]                      # Model dosyaları konumu
analysis-paths: ["analyses"]                 # Ad-hoc analiz konumu
test-paths: ["tests"]                        # Test dosyaları konumu
data-paths: ["data"]                         # Seed data konumu
macro-paths: ["macros"]                      # Makro konumu

target-path: "target"                        # Output klasörü
clean-targets:
  - "target"
  - "dbt_packages"

# ============================================================================
# MODEL CONFIGURATION
# ============================================================================
# +materialized: table = SQL'i tablo olarak kaydet (verimli)
# +materialized: view = Sorguda çalıştır (ucuz)
# +materialized: incremental = Sadece yeni veriler ekle (hızlı)

models:
  sepetix_analytics:
    # STAGING LAYER: Raw datayı temizle ve standartlaştır
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]
      
    # MARTS LAYER: Business logic (analiz hazır tablolar)
    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts"]

# ============================================================================
# SEEDS (Static Data)
# ============================================================================
seeds:
  sepetix_analytics:
    +schema: seeds

# ============================================================================
# SCHEMA.YML - MODEL AND COLUMN DOCUMENTATION
# ============================================================================
# Purpose: Document all models, columns, and relationships
# Benefit: Auto-generated documentation, IDE intellisense

version: 2

# ============================================================================
# STAGING MODELS
# ============================================================================
models:
  - name: stg_orders
    description: |
      Cleaned and standardized order data from Sepetix raw orders table.
      - Removed invalid records (quantity <= 0, price <= 0)
      - Standardized status values to English
      - Added calculated columns
    columns:
      - name: order_id
        description: Unique order identifier
        tests:
          - unique
          - not_null
      
      - name: customer_id
        description: Customer ID (Foreign Key)
        tests:
          - not_null
      
      - name: product_name
        description: Product name
      
      - name: category
        description: Product category (Electronics, Fashion, etc.)
      
      - name: quantity
        description: Number of units purchased
        tests:
          - not_null
      
      - name: price
        description: Unit price (₺)
        tests:
          - not_null
      
      - name: order_line_amount
        description: "Total line value (quantity * price)"
      
      - name: order_date
        description: Order date
      
      - name: city
        description: Customer city
      
      - name: order_status
        description: "Order status (Delivered, Cancelled, Returned, In Transit)"

# ============================================================================
# MARTS MODELS (FACTS)
# ============================================================================

  - name: fct_repeat_customers
    description: |
      Detailed analysis of customers with 2+ purchases.
      KPIs: Repeat purchase rate, LTV, category preferences
    columns:
      - name: customer_id
        description: Customer ID
        tests:
          - unique
          - not_null
      
      - name: total_orders
        description: Total number of customer purchases
      
      - name: total_spent_lira
        description: Total customer spending (₺)
      
      - name: avg_order_value
        description: Average order value per customer (₺)
      
      - name: preferred_categories
        description: "Customer preferred categories (comma-separated)"
      
      - name: customer_city
        description: Customer city

  - name: fct_churn_risk
    description: |
      Segment customers by inactivity level and churn risk.
      Segments: Active, At Risk, Dormant, Churned
    columns:
      - name: customer_id
        description: Customer ID
        tests:
          - unique
          - not_null
      
      - name: churn_segment
        description: "Customer churn risk segment"
        tests:
          - accepted_values:
              values: ['Active', 'At Risk', 'Dormant', 'Churned']
      
      - name: days_since_purchase
        description: Days since last purchase
      
      - name: lifetime_value
        description: Customer lifetime value (₺)

  - name: fct_rfm_segmentation
    description: |
      Customer segmentation using RFM (Recency, Frequency, Monetary) analysis.
      Segments: Champions, Loyal, At Risk, Lost, Potential
    columns:
      - name: customer_id
        description: Customer ID
        tests:
          - unique
          - not_null
      
      - name: rfm_segment
        description: "Customer RFM segment"
        tests:
          - accepted_values:
              values: ['Champions', 'Loyal Customers', 'At Risk', 'Lost Customers', 'Potential Customers', 'Others']
      
      - name: recency_score
        description: "Recency score (1-4, 4=best)"
      
      - name: frequency_score
        description: "Frequency score (1-4, 4=best)"
      
      - name: monetary_score
        description: "Monetary score (1-4, 4=best)"
      
      - name: rfm_combined_score
        description: "Average of 3 scores (1-4 scale)"

  - name: fct_cohort_analysis
    description: |
      Track customer cohort (monthly acquisition) retention rates.
      Retention understanding: which cohorts make repeat purchases?
    columns:
      - name: cohort_month
        description: "Customer first purchase month (YYYY-MM-01)"
      
      - name: purchase_month
        description: "Purchase month (YYYY-MM-01)"
      
      - name: months_since_first_purchase
        description: "Months elapsed since first purchase"
      
      - name: active_customers
        description: "Number of active customers that month"
      
      - name: retention_rate_percent
        description: "Retention rate (% of first month cohort)"

  - name: fct_product_affinity
    description: |
      Cross-sell opportunities: which product categories sell together.
      Use for bundling and recommendation strategies.
    columns:
      - name: category_pair
        description: "Two category combination (e.g., Electronics + Fashion)"
      
      - name: customer_count
        description: "Customers who purchased both categories together"
